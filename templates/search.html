<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search - Artmash</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='meed_style.css') }}">
    <style>
        body {
            background: #ffffff;
            color: #111111;
            font-family: "Vipnagorgialla", sans-serif;
            font-weight: 300;
        }

        .search-container {
            max-width: 1200px;
            margin: 95px auto 40px;
            padding: 0 20px;
            padding-bottom: 80px;
        }

        .search-form {
            display: flex;
            gap: 15px;
            margin-bottom: 40px;
            background: #111;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #f0f0f0;
        }

        .search-input {
            flex: 2;
            padding: 15px;
            border: 1px solid #e0e0e0;
            background: #ffffff;
            color: #111;
            border-radius: 5px;
            font-size: 1.1rem;
            font-family: 'MTV Lowercase 1', sans-serif;
            outline: none;
        }

        .search-input:focus {
            border-color: #ff2b56;
        }

        .category-select {
            flex: 1;
            padding: 15px;
            border: 1px solid #e0e0e0;
            background: #ffffff;
            color: #111;
            border-radius: 5px;
            font-size: 1.1rem;
            font-family: 'MTV Lowercase 1', sans-serif;
            outline: none;
        }

        .category-select:focus {
            border-color: #ff2b56;
        }

        .search-btn {
            padding: 15px 30px;
            background: #ff2b56;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1.1rem;
            font-weight: 300;
            cursor: pointer;
            font-family: 'MTV Lowercase 1', sans-serif;
            transition: 0.3s;
        }

        .search-btn:hover {
            background: #ff5a7c;
            transform: translateY(-2px);
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .result-item {
            aspect-ratio: 1/1;
            background: #ffffff;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            border: 1px solid #f0f0f0;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        .result-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .result-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 15px;
            background: linear-gradient(transparent, rgba(255, 255, 255, 0.9));
            color: #111;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }
    </style>
</head>

<body>
    <header>
        <a href="/" class="logo"
            style="font-size: 1.8rem; color: #ff2b56; text-decoration: none; font-weight: 300; text-transform: uppercase;">ARTMASH</a>
    </header>

    <div class="search-container">
        <form class="search-form" action="/search" method="GET">
            <input type="text" name="q" class="search-input" placeholder="Search for art, tags, or artists..."
                value="{{ query }}">

            <button type="submit" class="search-btn"><i class="fa-solid fa-magnifying-glass"></i> Search</button>
        </form>

        <h2 style="color: #ff2b56;">{{ posts|length }} Results found</h2>

        <div class="results-grid" style="margin-top: 20px;">
            {% for post in posts %}
            <a href="/post/{{ post.id }}">
                <div class="result-item">
                    <img src="{{ post.image_url }}" alt="{{ post.title }}">
                    <div class="result-overlay">
                        <div>
                            <div style="font-weight: 300; font-size: 1.1rem; color: #111;">{{ post.title }}</div>
                            <div style="font-size: 0.9rem; color: #666;">by {{ post.username }}</div>
                        </div>
                        <div style="color: #ff2b56; display: flex; align-items: center; gap: 4px;">
                            <svg width="16" height="16" viewBox="0 0 100 100">
                                <path d="M50,30 L35,15 L5,15 Q0,15 0,50 L50,95 L100,50 Q100,15 95,15 L65,15 Z"
                                    fill="#ff2b56" />
                            </svg>
                            {{ post.likes }}
                        </div>
                    </div>
                </div>
            </a>
            {% endfor %}
        </div>
    </div>


    <!-- Bottom Navigation Bar -->
    <link rel="stylesheet" href="{{ url_for('static', filename='tiktok_style.css') }}">
    <div class="bottom-nav">
        <a href="/feed" class="nav-item">
            <i class="fa-solid fa-house"></i>
            <span>Home</span>
        </a>
        <a href="/search" class="nav-item active">
            <i class="fa-solid fa-magnifying-glass"></i>
            <span>Search</span>
        </a>
        <a href="/forums" class="nav-item">
            <i class="fa-solid fa-comments"></i>
            <span>Community</span>
        </a>
        <a href="/upload" class="nav-item">
            <div class="nav-create-btn">
                <i class="fa-solid fa-plus"></i>
            </div>
        </a>
        <a href="/profile/{{ user }}" class="nav-item">
            <i class="fa-solid fa-user"></i>
            <span>Profile</span>
        </a>
    </div>
</body>

</html>

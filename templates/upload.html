<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Art - Artmash</title>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='Homepage.css') }}">
    <style>
    <style>
        @font-face {
            font-family: "Vipnagorgialla";
            src: url("/static/assets/fonts/vipnagorgialla/Vipnagorgialla Rg.otf") format("truetype");
        }
        body {
            background: #ffffff;
            color: #111111;
            font-family: "Vipnagorgialla", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding-bottom: 80px;
            font-weight: 300;
        }
        .upload-container {
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            width: 100%;
            max-width: 500px;
            border: 1px solid #f0f0f0;
            box-shadow: 0 10px 40px rgba(0,0,0,0.05);
        }
        h1 {
            font-family: 'Russo One', sans-serif;
            font-size: 2rem;
            margin-bottom: 30px;
            text-align: center;
            color: #ff2b56;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 300;
            color: #111;
        }
        input[type="text"], input[type="number"], textarea, input[type="file"], select {
            width: 100%;
            padding: 12px;
            background: #f8f9fa;
            border: 1px solid #f0f0f0;
            border-radius: 5px;
            color: #111;
            box-sizing: border-box;
            outline: none;
            font-family: "Vipnagorgialla", sans-serif;
        }
        input:focus, textarea:focus, select:focus {
            border-color: #ff2b56;
        }
        textarea {
            height: 100px;
            resize: none;
        }
        .submit-btn {
            width: 100%;
            padding: 15px;
            background: #ff2b56;
            border: none;
            border-radius: 5px;
            color: white;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            background: #ff5a7c;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #666;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .back-link:hover {
            color: #ff2b56;
        }
    </style>
</head>
<body>
    <div class="upload-container">
        <h1>Share Your Art</h1>
        <form action="/upload" method="POST" enctype="multipart/form-data">
            <div class="form-group">
                <label for="file">Artwork File</label>
                <input type="file" name="file" id="file" required>
            </div>
            <div class="form-group">
                <label for="title">Title</label>
                <input type="text" name="title" id="title" placeholder="Give it a name..." required>
            </div>
            <div class="form-group">
                <label for="description">Description</label>
                <textarea name="description" id="description" placeholder="Tell the story behind this piece..."></textarea>
            </div>
            <div class="form-group">
                <label for="tags">Tags (comma separated)</label>
                <input type="text" name="tags" id="tags" placeholder="e.g. digital, 3d, abstract">
            </div>
            
            <div class="form-group" style="display: flex; gap: 20px;">
                <div style="flex: 1;">
                    <label for="category">Category</label>
                    <select name="category" id="category">
                        <option value="Digital Art">Digital Art</option>
                        <option value="Photography">Photography</option>
                        <option value="Traditional Art">Traditional Art</option>
                        <option value="3D Modeling">3D Modeling</option>
                        <option value="Animation">Animation</option>
                    </select>
                </div>
                <div style="flex: 1;">
                    <label for="license">License</label>
                    <select name="license" id="license">
                        <option value="Standard">Standard</option>
                        <option value="Creative Commons">Creative Commons</option>
                        <option value="Commercial">Commercial</option>
                    </select>
                </div>
            </div>

            <div class="form-group" style="display: flex; align-items: center; justify-content: space-between; background: #000; padding: 15px; border-radius: 5px; border: 1px solid #333;">
                <div>
                    <label for="price" style="margin: 0; display: inline-block;">Sell this Art (Price $)</label>
                    <input type="number" name="price" id="price" step="0.01" min="0" value="0.00" style="width: 80px; padding: 5px; margin-left: 10px; display: inline-block;">
                </div>
                <div style="display: flex; align-items: center; gap: 10px;">
                    <label for="is_mature" style="margin: 0; color: #ff2b56; font-weight: bold;">Mature Content?</label>
                    <input type="checkbox" name="is_mature" id="is_mature" style="width: 20px; height: 20px; accent-color: #ff2b56;">
                </div>
            </div>
            <button type="submit" class="submit-btn">UPLOAD TO ARTMASH</button>
        </form>
        <a href="/feed" class="back-link">Back to Feed</a>
    </div>

    <!-- Bottom Navigation Bar -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='tiktok_style.css') }}">
    <div class="bottom-nav">
        <a href="/feed" class="nav-item">
            <i class="fa-solid fa-house"></i>
            <span>Home</span>
        </a>
        <a href="/explore" class="nav-item">
            <i class="fa-solid fa-compass"></i>
            <span>Explore</span>
        </a>
        <a href="/search" class="nav-item">
            <i class="fa-solid fa-magnifying-glass"></i>
            <span>Search</span>
        </a>
        <a href="/forums" class="nav-item">
            <i class="fa-solid fa-comments"></i>
            <span>Community</span>
        </a>
        <a href="/upload" class="nav-item active">
            <div class="nav-create-btn">
                <i class="fa-solid fa-plus"></i>
            </div>
        </a>
        <a href="/profile/{{ user }}" class="nav-item">
            <i class="fa-solid fa-user"></i>
            <span>Profile</span>
        </a>
    </div>
</body>
</html>
